<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Admin - Edit Absensi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { 
      text-align: center; 
      margin-bottom: 30px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Search Bar */
    .search-box {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid #333;
    }
    .search-box input {
      width: 100%;
      padding: 15px 20px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #0f0f0f;
      color: #fff;
      outline: none;
    }
    .search-box input::placeholder { color: #666; }
    
    /* Student Card */
    .student-card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #333;
      display: none;
    }
    .student-card.active { display: block; }
    .student-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    .info-item label {
      color: #888;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .info-item .value {
      font-size: 18px;
      font-weight: 600;
      margin-top: 5px;
    }
    .info-item .value.id { color: #00d4ff; }
    .info-item .value.nama { color: #fff; font-size: 24px; }
    .info-item .value.kelas { color: #7b2cbf; }
    .info-item .value.ekstra { color: #ff6b35; }
    
    /* Attendance Grid */
    .attendance-section h3 {
      margin-bottom: 15px;
      color: #00d4ff;
    }
    .attendance-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }
    .attendance-item {
      background: #0f0f0f;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #333;
      transition: all 0.3s;
    }
    .attendance-item:hover { border-color: #00d4ff; }
    .attendance-item label {
      display: block;
      color: #888;
      font-size: 11px;
      margin-bottom: 8px;
    }
    .attendance-item select {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }
    .attendance-item select:focus { background: #252525; }
    
    /* Status Colors */
    .status-hadir { background: #1a4d2e !important; color: #4ade80 !important; }
    .status-izin { background: #713f12 !important; color: #fbbf24 !important; }
    .status-sakit { background: #1e3a8a !important; color: #60a5fa !important; }
    .status-alpha { background: #7f1d1d !important; color: #f87171 !important; }
    
    /* Save Indicator */
    .save-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 25px;
      border-radius: 12px;
      font-weight: 600;
      transform: translateX(150%);
      transition: transform 0.3s;
      z-index: 1000;
    }
    .save-indicator.show { transform: translateX(0); }
    .save-indicator.success { background: #1a4d2e; color: #4ade80; }
    .save-indicator.error { background: #7f1d1d; color: #f87171; }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #00d4ff;
      border-top-color: transparent;
      border-radius: 50%;
      margin-left: 10px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* No Results */
    .no-results {
      text-align: center;
      padding: 40px;
      color: #666;
      display: none;
    }
    
    /* Stats */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: #1a1a1a;
      padding: 15px 25px;
      border-radius: 12px;
      border: 1px solid #333;
    }
    .stat-box .number {
      font-size: 28px;
      font-weight: 700;
      color: #00d4ff;
    }
    .stat-box .label {
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MASTER ADMIN - EDIT ABSENSI</h1>
    
    <div class="stats" id="stats">
      <div class="stat-box">
        <div class="number" id="totalStudents">-</div>
        <div class="label">Total Siswa</div>
      </div>
      <div class="stat-box">
        <div class="number" id="totalDays">-</div>
        <div class="label">Hari Tercatat</div>
      </div>
    </div>
    
    <div class="search-box">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Cari nama siswa..." 
        autocomplete="off"
      >
    </div>
    
    <div class="loading" id="loading">Memuat data...</div>
    <div class="no-results" id="noResults">Tidak ada siswa dengan nama tersebut</div>
    
    <div id="studentContainer"></div>
  </div>
  
  <div class="save-indicator" id="saveIndicator"></div>

  <script>
    // CONFIG - Replace with your GAS Web App URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzwgwoKQNXSWn7BrwlzZe1XmVlY0JnGgA6CKY7cjVUXols6Oo_7IyBIiuVDmoQh__wO/exec';
    
    let allStudents = [];
    let attendanceColumns = [];
    
    // Status options
    const STATUS_OPTIONS = [
  { value: '', label: 'Kosong', class: '' },
  { value: 'HADIR', label: 'HADIR', class: 'status-hadir' },
  { value: 'IZIN', label: 'IZIN', class: 'status-izin' },
  { value: 'SAKIT', label: 'SAKIT', class: 'status-sakit' },
  { value: 'ALPHA', label: 'ALPHA', class: 'status-alpha' },
  { value: 'TERLAMBAT', label: 'TERLAMBAT', class: 'status-alpha' },
  { value: 'PAGI', label: 'PAGI', class: 'status-hadir' }
];
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      document.getElementById('searchInput').addEventListener('input', handleSearch);
    });
    
    async function loadData() {
      try {
        const response = await fetch(`${GAS_URL}?action=masterData`);
        const result = await response.json();
        
        if (Array.isArray(result) && result.length > 0) {
          allStudents = result;
          attendanceColumns = result[0].absenColumns || [];
          
          document.getElementById('totalStudents').textContent = result.length;
          document.getElementById('totalDays').textContent = attendanceColumns.length;
          
          document.getElementById('loading').style.display = 'none';
        } else {
          throw new Error('Invalid data format');
        }
      } catch (err) {
        document.getElementById('loading').textContent = 'Error: ' + err.message;
      }
    }
    
    function handleSearch(e) {
      const query = e.target.value.trim().toLowerCase();
      const container = document.getElementById('studentContainer');
      const noResults = document.getElementById('noResults');
      
      container.innerHTML = '';
      
      if (!query) {
        noResults.style.display = 'none';
        return;
      }
      
      const matches = allStudents.filter(s => 
        s.nama.toLowerCase().includes(query)
      );
      
      if (matches.length === 0) {
        noResults.style.display = 'block';
        return;
      }
      
      noResults.style.display = 'none';
      matches.forEach(student => {
        container.appendChild(createStudentCard(student));
      });
    }
    
    function createStudentCard(student) {
      const card = document.createElement('div');
      card.className = 'student-card active';
      
      // Info section
      const info = document.createElement('div');
      info.className = 'student-info';
      info.innerHTML = `
        <div class="info-item">
          <label>ID</label>
          <div class="value id">${student.id}</div>
        </div>
        <div class="info-item">
          <label>Nama</label>
          <div class="value nama">${student.nama}</div>
        </div>
        <div class="info-item">
          <label>Kelas</label>
          <div class="value kelas">${student.kelas}</div>
        </div>
        <div class="info-item">
          <label>Ekstra</label>
          <div class="value ekstra">${student.ekstra}</div>
        </div>
        <div class="info-item">
          <label>Denda</label>
          <div class="value">Rp ${student.denda.toLocaleString()}</div>
        </div>
        <div class="info-item">
          <label>Status</label>
          <div class="value">${student.status}</div>
        </div>
      `;
      
      // Attendance section
      const attSection = document.createElement('div');
      attSection.className = 'attendance-section';
      attSection.innerHTML = '<h3>Edit Absensi Harian</h3>';
      
      const grid = document.createElement('div');
      grid.className = 'attendance-grid';
      
      attendanceColumns.forEach((col, idx) => {
       const currentValue = (student.absensi[idx] || '').toUpperCase();
        const item = document.createElement('div');
        item.className = 'attendance-item';
        
        const select = document.createElement('select');
        select.dataset.row = student.rowIndex;
        select.dataset.col = col.col + 1; // 1-based for Sheets
        select.dataset.date = col.header;
        
        STATUS_OPTIONS.forEach(opt => {
          const option = document.createElement('option');
          option.value = opt.value;
          option.textContent = opt.label;
          if (opt.value === currentValue) option.selected = true;
          select.appendChild(option);
        });
        
        // Apply color class
        updateSelectStyle(select, currentValue);
        
        select.addEventListener('change', (e) => {
          updateSelectStyle(e.target, e.target.value);
          saveAttendance(e.target);
        });
        
        item.innerHTML = `<label>${col.header}</label>`;
        item.appendChild(select);
        grid.appendChild(item);
      });
      
      attSection.appendChild(grid);
      
      card.appendChild(info);
      card.appendChild(attSection);
      
      return card;
    }
    
    function updateSelectStyle(select, value) {
      select.className = '';
      const option = STATUS_OPTIONS.find(o => o.value === value);
      if (option && option.class) {
        select.classList.add(option.class);
      }
    }

    async function saveAttendance(select) {
  const row = parseInt(select.dataset.row);
  const col = parseInt(select.dataset.col);
  const value = select.value;

  try {
    const response = await fetch(
      `${GAS_URL}?action=updateAttendance&rowIndex=${row}&columnIndex=${col}&value=${value}`
    );

    const result = await response.json();

    if (result.status === 'ok') {
      showIndicator('success', `Tersimpan: ${select.dataset.date}`);
    } else {
      throw new Error(result.message);
    }
  } catch (err) {
    showIndicator('error', 'Gagal menyimpan!');
    console.error(err);
  }
}
    async function saveAttendance(select) {
      const data = {
        action: 'updateAttendance',
        rowIndex: parseInt(select.dataset.row),
        columnIndex: parseInt(select.dataset.col),
        value: select.value
      };
      
      try {
        await fetch(`${GAS_URL}?action=updateAttendance&rowIndex=${row}&columnIndex=${col}&value=${value}`);
        
        const result = await response.json();
        
        if (result.status === 'ok') {
          showIndicator('success', `Tersimpan: ${select.dataset.date}`);
        } else {
          throw new Error(result.message);
        }
      } catch (err) {
        showIndicator('error', 'Gagal menyimpan!');
        console.error(err);
      }
    }
    
    function showIndicator(type, message) {
      const indicator = document.getElementById('saveIndicator');
      indicator.textContent = message;
      indicator.className = `save-indicator ${type} show`;
      
      setTimeout(() => {
        indicator.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
